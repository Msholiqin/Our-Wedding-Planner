/**
 * Mendapatkan atau membuat sheet database otomatis di file Spreadsheet aktif
 */
function getSpreadsheet() {
  var ss = SpreadsheetApp.getActiveSpreadsheet();
  var sheet = ss.getSheetByName("PlannerData");
  
  if (!sheet) {
    sheet = ss.insertSheet("PlannerData");
    sheet.appendRow(["Category ID", "Category Name", "Item ID", "Item Name", "Price", "Description", "Is Bought"]);
    sheet.getRange(1, 1, 1, 7).setFontWeight("bold");
    sheet.getRange(1, 1, 1, 7).setBackground("#f3f4f6");
  }
  return sheet;
}

/**
 * Mengambil data dari Google Sheets dan menyusunnya kembali menjadi format objek untuk React
 */
function getPlannerData() {
  try {
    var sheet = getSpreadsheet();
    var rows = sheet.getDataRange().getValues();
    
    // Ambil tanggal pernikahan dan nama pasangan dari PlannerSettings
    var weddingDate = "2027-01-01"; // default awal
    var coupleNames = "Romeo & Juliet"; // default awal
    var ss = SpreadsheetApp.getActiveSpreadsheet();
    var settingsSheet = ss.getSheetByName("PlannerSettings");
    if (settingsSheet) {
      var settingsRows = settingsSheet.getDataRange().getValues();
      for (var j = 1; j < settingsRows.length; j++) {
        if (settingsRows[j][0] === "weddingDate") {
          var dateVal = settingsRows[j][1];
          if (dateVal instanceof Date) {
            weddingDate = Utilities.formatDate(dateVal, Session.getScriptTimeZone(), "yyyy-MM-dd");
          } else {
            weddingDate = String(dateVal);
          }
        } else if (settingsRows[j][0] === "coupleNames") {
          coupleNames = String(settingsRows[j][1]);
        }
      }
    } else {
      // Buat settings sheet otomatis
      settingsSheet = ss.insertSheet("PlannerSettings");
      settingsSheet.appendRow(["Key", "Value"]);
      settingsSheet.appendRow(["weddingDate", "2027-01-01"]);
      settingsSheet.appendRow(["coupleNames", "Romeo & Juliet"]);
      settingsSheet.getRange(1, 1, 1, 2).setFontWeight("bold");
      settingsSheet.getRange(1, 1, 1, 2).setBackground("#f3f4f6");
    }

    if (rows.length <= 1) {
      return { categories: [], weddingDate: weddingDate, coupleNames: coupleNames };
    }

    var categoriesMap = {};
    var categoriesOrder = [];

    for (var i = 1; i < rows.length; i++) {
      var catId = rows[i][0];
      var catName = rows[i][1];
      var itemId = rows[i][2];
      var itemName = rows[i][3];
      var price = rows[i][4];
      var description = rows[i][5];
      var isBought = rows[i][6];

      if (!catId) continue;

      if (!categoriesMap[catId]) {
        categoriesMap[catId] = {
          id: catId,
          name: catName,
          items: []
        };
        categoriesOrder.push(catId);
      }

      if (itemId) {
        categoriesMap[catId].items.push({
          id: itemId,
          name: itemName,
          price: Number(price) || 0,
          description: description || '',
          isBought: isBought === true || isBought === "TRUE"
        });
      }
    }

    var categories = categoriesOrder.map(function(id) {
      return categoriesMap[id];
    });

    return { categories: categories, weddingDate: weddingDate, coupleNames: coupleNames };
  } catch (e) {
    Logger.log(e.toString());
    throw new Error("Gagal memuat data: " + e.message);
  }
}

/**
 * Menyimpan data dari aplikasi React kembali ke Google Sheets
 */
function savePlannerData(newData) {
  try {
    var sheet = getSpreadsheet();
    sheet.clearContents();
    
    sheet.appendRow(["Category ID", "Category Name", "Item ID", "Item Name", "Price", "Description", "Is Bought"]);
    sheet.getRange(1, 1, 1, 7).setFontWeight("bold");
    sheet.getRange(1, 1, 1, 7).setBackground("#f3f4f6");

    if (!newData) {
      return { success: true };
    }

    // Update settings di PlannerSettings jika dikirimkan oleh React
    var ss = SpreadsheetApp.getActiveSpreadsheet();
    var settingsSheet = ss.getSheetByName("PlannerSettings");
    if (!settingsSheet) {
      settingsSheet = ss.insertSheet("PlannerSettings");
    }
    settingsSheet.clearContents();
    settingsSheet.appendRow(["Key", "Value"]);
    settingsSheet.getRange(1, 1, 1, 2).setFontWeight("bold");
    settingsSheet.getRange(1, 1, 1, 2).setBackground("#f3f4f6");
    
    var dateToSave = newData.weddingDate || "2027-01-01";
    var namesToSave = newData.coupleNames || "Romeo & Juliet";
    settingsSheet.appendRow(["weddingDate", dateToSave]);
    settingsSheet.appendRow(["coupleNames", namesToSave]);

    if (!newData.categories || newData.categories.length === 0) {
      return { success: true };
    }

    var rowsToAppend = [];
    
    newData.categories.forEach(function(cat) {
      if (cat.items && cat.items.length > 0) {
        cat.items.forEach(function(item) {
          rowsToAppend.push([
            cat.id,
            cat.name,
            item.id,
            item.name,
            item.price,
            item.description,
            item.isBought
          ]);
        });
      } else {
        rowsToAppend.push([
          cat.id,
          cat.name,
          "",
          "",
          "",
          "",
          ""
        ]);
      }
    });

    if (rowsToAppend.length > 0) {
      sheet.getRange(2, 1, rowsToAppend.length, 7).setValues(rowsToAppend);
    }

    return { success: true };
  } catch (e) {
    Logger.log(e.toString());
    throw new Error("Gagal menyimpan data: " + e.message);
  }
}</textarea>

        const radius = 25;
        const circumference = 2 * Math.PI * radius;

              const dashArray = `${percent * circumference} ${circumference}`;
              const dashOffset = -(cumulative / total) * circumference;
              cumulative += slice.value;

                <circle
                  key={i}
                  r={radius}
                  cx="50"
                  cy="50"
                  fill="transparent"
                  stroke={colors[i % colors.length]}
                  strokeWidth="50"

                              <button

                              >

                            </div>
                          </div>

            )}
          </main>

    }

    const root = ReactDOM.createRoot(document.getElementById('root'));

                          Pada bagian menu bar atas di Spreadsheet baru Anda, masuk ke menu <strong className="font-semibold text-slate-800 dark:text-slate-100">Ekstensi</strong> (atau <em>Extensions</em>) lalu klik tombol <strong className="font-semibold text-slate-800 dark:text-slate-100">Apps Script</strong>. Layar editor pemrograman Google Apps Script akan terbuka di tab baru.
                        </p>
                      </div>

                      <div className="relative pl-8 border-l-2 border-pink-500/30 dark:border-pink-500/20 py-2">
                        <span className="absolute left-[-11px] top-2 bg-pink-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs font-bold shadow-md">3</span>
                        <h4 className="font-bold text-slate-900 dark:text-white mb-1">Pasang File Code.gs &amp; Index.html</h4>
                        <p className="text-xs leading-relaxed text-slate-500 dark:text-slate-400">
                          Kembali ke panel ini pada tab sebelah kiri, lalu salin seluruh kode dari file <strong className="font-semibold text-slate-800 dark:text-slate-100">Code.gs</strong> dan timpa semua kode di dalam editor <code className="bg-slate-100 dark:bg-slate-900 px-1.5 py-0.5 rounded">Code.gs</code> milik Google. Klik tombol ikon <strong>+</strong> di samping kiri Google Script -> pilih jenis file <strong>HTML</strong> -> beri nama file <code className="bg-slate-100 dark:bg-slate-900 px-1.5 py-0.5 rounded">Index</code> (tanpa menulis .html), lalu timpa isi kodenya dengan menyalin file <strong className="font-semibold text-slate-800 dark:text-slate-100">Index.html</strong> dari halaman hub ini. Simpan project script (tekan <kbd className="bg-slate-150 px-1 py-0.5 rounded text-xs">Ctrl + S</kbd>).
                        </p>
                      </div>

                      <div className="relative pl-8 border-l-2 border-pink-500/30 dark:border-pink-500/20 py-2">
                        <span className="absolute left-[-11px] top-2 bg-pink-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs font-bold shadow-md">4</span>
                        <h4 className="font-bold text-slate-900 dark:text-white mb-1">Deploy Sebagai Aplikasi Web</h4>
                        <p className="text-xs leading-relaxed text-slate-500 dark:text-slate-400">
                          Klik tombol biru di pojok kanan atas bertuliskan <strong className="font-semibold text-slate-800 dark:text-slate-100">Terapkan</strong> (atau <em>Deploy</em>) -&gt; pilih <strong className="font-semibold text-slate-800 dark:text-slate-100">Penerapan baru</strong> (atau <em>New deployment</em>). Pada jendela konfigurasi yang muncul, pilih tombol gerigi di sebelah kiri dan pilih jenis <strong className="font-semibold text-slate-800 dark:text-slate-100">Aplikasi Web</strong> (atau <em>Web App</em>). Atur konfigurasi wajib berikut:
                        </p>
                        <ul className="list-disc pl-5 mt-2 space-y-1 text-xs text-slate-500 dark:text-slate-400">
                          <li><strong>Jalankan sebagai:</strong> Pilih <strong className="font-semibold text-slate-800 dark:text-slate-100">Saya</strong> (atau <em>Me</em>).</li>
                          <li><strong>Siapa yang memiliki akses:</strong> Pilih <strong className="font-semibold text-slate-800 dark:text-slate-100">Siapa saja</strong> (atau <em>Anyone</em>) agar kerabat atau pasangan Anda bisa mengedit datanya secara nirkabel dari ponsel masing-masing.</li>
                        </ul>
                      </div>

                      <div className="relative pl-8 py-2">
                        <span className="absolute left-[-11px] top-2 bg-pink-500 text-white rounded-full w-5 h-5 flex items-center justify-center text-xs font-bold shadow-md">5</span>
                        <h4 className="font-bold text-slate-900 dark:text-white mb-1">Berikan Otorisasi Keamanan Google</h4>
                        <p className="text-xs leading-relaxed text-slate-500 dark:text-slate-400">
                          Klik tombol <strong className="font-semibold text-slate-800 dark:text-slate-100">Terapkan</strong>. Google akan memunculkan popup permintaan izin akses database. Klik tombol <strong className="font-semibold text-slate-800 dark:text-slate-100">Izinkan Akses</strong> -&gt; Klik akun Google Anda -&gt; Pilih opsi <strong className="font-semibold text-slate-800 dark:text-slate-100">Lanjutan (Advanced)</strong> di kiri bawah -&gt; klik tulisan <strong className="font-semibold text-red-500 underline">Buka Project Anda (Tidak aman)</strong> -&gt; lalu klik <strong className="font-semibold text-slate-800 dark:text-slate-100">Izinkan (Allow)</strong>. Google Apps Script akan memberikan URL Web App yang unik. Selesai! Salin URL itu dan bagikan ke pasangan Anda.
                        </p>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    const mainRoot = ReactDOM.createRoot(document.getElementById('root'));
    mainRoot.render(<MainApp />);
  </script>
</body>
</html>
